# Hermes VPS - docker compose example template (v0.2.x)
# ============================================================
# THIS IS A TEMPLATE. To use it:
#   1. Copy to docker-compose.yml on the VPS:
#        cp docker-compose.example.yml docker-compose.yml
#   2. Copy ../env/.env.example to ../env/.env and fill in real values
#   3. Run: docker compose --env-file ../env/.env up -d
#
# Current deployment model (v0.2.x):
#   bridge-ingress and watchdog are built locally on VPS from the
#   blueprint repo. No GHCR pull needed.
# ============================================================
#
# Service architecture:
#
#   bridge-ingress     Telegram MTProto listener (Telethon userbot).
#                      Monitors whitelisted chats, writes captures to
#                      /data/inbox/Telegram-Captures/.
#
#   watchdog           Polls bridge /healthz every 60s. Sends Telegram
#                      alert when bridge is unhealthy or recovers.
#
#   cloudflared        Cloudflare Tunnel client. Not needed for MTProto
#                      mode but kept for future webhook/web endpoints.
#
#   intel-pipelines    (placeholder) Periodic worker for daily digests.
#                      NOT yet implemented.
#
# ============================================================

services:

  # --------------------------------------------------------------
  # bridge-ingress: Telegram MTProto listener
  # --------------------------------------------------------------
  bridge-ingress:
    build:
      context: ${BLUEPRINT_REPO_PATH:-/opt/hermes-blueprint}/50-Intelligence/community-bridges/bridge-ingress
      dockerfile: Dockerfile
    image: bridge-ingress:v0.2.2
    container_name: hermes-bridge-ingress
    restart: on-failure:5
    networks:
      - hermes-net
    env_file:
      - ../env/.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      INBOX_PATH: /data/inbox
      KEYWORDS_PATH: /blueprint/50-Intelligence/pipelines/keywords.yaml
      LISTEN_PORT: "8080"
    volumes:
      - hermes-data:/data
      - blueprint-ro:/blueprint:ro
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # --------------------------------------------------------------
  # watchdog: monitors bridge-ingress, alerts via Telegram bot
  # --------------------------------------------------------------
  watchdog:
    build:
      context: ${BLUEPRINT_REPO_PATH:-/opt/hermes-blueprint}/50-Intelligence/community-bridges/watchdog
      dockerfile: Dockerfile
    image: hermes-watchdog:v0.1.0
    container_name: hermes-watchdog
    restart: always
    networks:
      - hermes-net
    environment:
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN:?ALERT_TELEGRAM_BOT_TOKEN missing}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:?ALERT_TELEGRAM_CHAT_ID missing}
      BRIDGE_HEALTHZ_URL: ${BRIDGE_HEALTHZ_URL:-http://hermes-bridge-ingress:8080/healthz}
      CHECK_INTERVAL_SECONDS: ${CHECK_INTERVAL_SECONDS:-60}
      FAILURE_THRESHOLD: ${FAILURE_THRESHOLD:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      bridge-ingress:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

  # --------------------------------------------------------------
  # cloudflared: Cloudflare Tunnel client
  # --------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:2024.10.1
    container_name: hermes-cloudflared
    restart: unless-stopped
    networks:
      - hermes-net
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN missing}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"

  # --------------------------------------------------------------
  # intel-pipelines: placeholder (not yet implemented)
  # --------------------------------------------------------------
  # intel-pipelines:
  #   build:
  #     context: ${BLUEPRINT_REPO_PATH}/50-Intelligence/pipelines
  #   container_name: hermes-intel-pipelines
  #   restart: on-failure:5
  #   networks:
  #     - hermes-net
  #   volumes:
  #     - hermes-data:/data
  #     - blueprint-ro:/blueprint:ro
  #   depends_on:
  #     bridge-ingress:
  #       condition: service_healthy

# ============================================================
# Networks
# ============================================================
networks:
  hermes-net:
    name: hermes-net
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  hermes-data:
    name: hermes-data
    driver: local
  blueprint-ro:
    name: blueprint-ro
    driver: local
    driver_opts:
      type: none
      device: ${BLUEPRINT_REPO_PATH:-/opt/hermes-blueprint}
      o: bind
