# Phase Routing Keywords Dictionary
# ====================================================================
# Consumed by: intel-summarizer agent, Inbox-Processing-Rules section 5,
#              community-bridges (pre-tag at capture time)
#
# Routing rules:
#   1. Match captures against ALL phases top-to-bottom.
#   2. First match wins (one phase per capture).
#   3. Ties resolved by lowest phase number.
#   4. No match -> phase=null -> 00-Inbox To-Process.
#   5. Case-insensitive substring match. No regex.
#   6. This file MUST stay pure ASCII for CI audit.
#   7. See README.md for Chinese documentation.
#
# Maintenance: review quarterly. See _meta.next_review.
# ====================================================================

