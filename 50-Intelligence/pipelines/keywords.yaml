# Phase Routing Keywords Dictionary
# ==========================================================================
# Used by:
#   - intel-summarizer agent (auto-tag captures with phase during triage)
#   - Inbox-Processing-Rules.md section 5 (phase routing rules)
#   - 50-Intelligence community-bridges (pre-tag at capture time)
#
# Rules:
#   1. Each capture is matched against ALL keyword lists top-to-bottom.
#   2. First match wins (a capture gets exactly ONE phase unless override).
#   3. If multiple phases match, use the FIRST phase in numeric order.
#   4. If nothing matches, phase = null -> goes to 00-Inbox To-Process.
#   5. Keywords are case-insensitive. Regex not supported (plain substring).
#   6. Chinese keywords are supported (bridges output may be Chinese).
#   7. This file MUST stay ASCII-safe for audit (Chinese keywords in quotes).
#
# Maintenance:
#   - Add new keywords as you discover new sources or topics.
#   - Review quarterly: remove dead projects, add new ones.
#   - If a keyword causes false positives, move it to the exclude list.
#
# Format:
#   phase_<N>:
#     include: [list of keywords that route to this phase]
#     exclude: [list of keywords that override include, forcing re-triage]
# ==========================================================================

