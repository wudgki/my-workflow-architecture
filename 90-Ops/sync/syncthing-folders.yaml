# Syncthing share configuration (authoritative declaration)
# ----------------------------------------------------------------------
# This file documents the intended Syncthing layout. Syncthing itself
# does NOT read this file. All shares must be created manually in the
# Syncthing Web GUI on each device. Every participating machine must
# match this file for: folder id, path, type, ignore rules, versioning.
# Workflow: edit this file and commit to Git first, then update the GUI.
#
# Chinese explanations and rationale: see ./README.md section 6.
# Human-readable details that contain CJK belong in README.md so that
# this YAML stays ASCII-only and passes the script-hygiene audit.
# ----------------------------------------------------------------------

devices:
  primary:
    name: samuel-primary
    id: "TODO-PASTE-PRIMARY-DEVICE-ID"   # copy from Syncthing GUI Settings
    role: primary
  secondary:
    name: samuel-secondary
    id: "TODO-PASTE-SECONDARY-DEVICE-ID"
    role: secondary
  # The VPS does not participate in Syncthing. Hermes consumes via
  # Git pull + SSH rsync only (one-way).

# Default versioning policy applied to every share.
defaults:
  versioning:
    type: simple
    keep: 7              # keep 7 historical versions
  fs_watcher_enabled: true
  rescan_interval_s: 3600

folders:

  - id: samuel-aiws-wiki
    label: AI-Workspace - Hermes Wiki
    path_relative: 10-Hermes-Wiki
    devices: [primary, secondary]
    type:
      primary: sendreceive
      secondary: receiveonly      # switch to sendreceive only on takeover
    ignore_perms: true
    notes: obsidian-vault-primary-only-writes

  - id: samuel-aiws-claude-code
    label: AI-Workspace - Claude Code Assets
    path_relative: 20-Claude-Code
    devices: [primary, secondary]
    type:
      primary: sendreceive
      secondary: sendreceive
    ignore_perms: true
    notes: agents-skills-prompts-mcp-config

  - id: samuel-aiws-phases
    label: AI-Workspace - Phases Code
    path_relative: 30-Phases
    devices: [primary, secondary]
    type:
      primary: sendreceive
      secondary: sendreceive
    ignore_perms: true
    notes: business-code-build-artifacts-ignored

  - id: samuel-aiws-inbox
    label: AI-Workspace - Inbox
    path_relative: 00-Inbox
    devices: [primary, secondary]
    type:
      primary: sendreceive
      secondary: sendreceive
    ignore_perms: true
    notes: bidirectional-captures-from-either-machine

  - id: samuel-aiws-repo-research
    label: AI-Workspace - Repo Research
    path_relative: 60-Repo-Research
    devices: [primary, secondary]
    type:
      primary: sendreceive
      secondary: sendreceive
    ignore_perms: true
    notes: repo-analysis-reports-comparisons-adopt-reject-lists

# ----------------------------------------------------------------------
# Explicit deny-list: directories that MUST NOT enter any Syncthing folder
# ----------------------------------------------------------------------
never_share:
  - 40-Hermes-VPS         # synced via Git + SSH rsync only
  - 50-Intelligence       # same as above
  - 70-Sandbox            # per-machine experiment area
  - 90-Ops/secrets        # never transmitted in cleartext
  - 90-Ops/backup         # local-only backup output
  - .git
